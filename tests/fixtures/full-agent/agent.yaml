name: frontend-reviewer
description: Reviews frontend code, UX regressions, and performance.
defaults:
  sandbox: workspace-write
  skills:
    - web-design-guidelines
    - plan-reviewer
claude:
  model: opus-4.6
  tools:
    - Read
    - Grep
    - Glob
  disallowed_tools:
    - Write
  permission_mode: default
  max_turns: 12
  effort: high
  mcp_servers:
    - github
  background: true
copilot:
  target: github-copilot
  tools:
    - read
    - search
    - edit
    - github/*
  model: gpt-5.4-high
  disable_model_invocation: true
  user_invocable: true
  metadata:
    owner: frontend-platform
    tier: primary
codex:
  model: gpt-5.4
  model_reasoning_effort: high
  nickname_candidates:
    - Atlas
    - Echo
  mcp_servers:
    github:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-github"
  skills_config:
    - name: web-design-guidelines
      enabled: false
gemini:
  tools:
    - read_file
    - grep_search
    - mcp_github_*
  model: gemini-2.5-flash
  temperature: 0.2
  max_turns: 12
  timeout_mins: 10
  mcp_servers:
    github:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-github"
